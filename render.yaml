services:
  - type: web
    name: companyscrape-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: companyscrape-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          name: companyscrape-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SERPAPI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: companyscrape-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: companyscrape-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: companyscrape-db
    plan: free
